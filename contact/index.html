<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 | fullake.co.kr</title>
  <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/css/main.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3943299422462285" crossorigin="anonymous"></script>
</head>
<body>
  <header id="site-header"></header>
  <main class="page-main container content-narrow" id="page-content">
    <nav class="breadcrumb" aria-label="breadcrumb" id="breadcrumb"></nav>
    <h1>문의하기</h1>
    <p>사이트 내용 관련 문의, 오류 제보, 콘텐츠 제안은 아래 이메일로 보내 주세요. 연락 수단은 이메일만 운영합니다.</p>

    <div class="info-box" style="margin:1.5rem 0;">
      <h3>이메일 문의</h3>
      <p><a href="#" id="contact-email-link" style="font-size:1.1rem;font-weight:700;"></a></p>
      <p style="margin:0;font-size:0.9rem;">영업일 기준 순차적으로 답변드리며, 답변 가능한 범위를 넘는 상담은 정중히 안내해 드릴 수 있습니다.</p>
    </div>

    <h2>문의 양식 (데모)</h2>
    <p style="font-size:0.9rem;color:var(--color-text-muted);">아래 양식은 UI 데모입니다. 실제 메일 전송 기능은 없으며, 작성 후 이메일 클라이언트로 직접 보내 주세요.</p>

    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label for="name">이름 (선택)</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">회신 이메일</label>
        <input type="email" id="email" name="email" placeholder="답변 받을 이메일" required>
      </div>
      <div class="form-group">
        <label for="subject">제목</label>
        <input type="text" id="subject" name="subject" placeholder="문의 제목" required>
      </div>
      <div class="form-group">
        <label for="message">내용</label>
        <textarea id="message" name="message" placeholder="문의 내용을 입력하세요" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">이메일 앱으로 보내기</button>
    </form>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config/site.config.js"></script>
  <script src="../assets/js/data/categories.js"></script>
  <script src="../assets/js/data/posts.js"></script>
  <script src="../assets/js/data/columns.js"></script>
  <script src="../assets/js/lib/utils.js"></script>
  <script src="../assets/js/lib/storage.js"></script>
  <script src="../assets/js/lib/seo.js"></script>
  <script src="../assets/js/components/layout.js"></script>
  <script>
    Layout.init('contact');
    const s = DataStore.getSettings();
    SEO.setPageMeta({ title: '문의하기', description: `${s.siteName}에 문의하세요. 이메일: ${s.email}`, canonical: `${s.domain}/contact/` });
    document.getElementById('breadcrumb').innerHTML = Layout.breadcrumb([{ name: '문의하기', url: '' }]);
    const link = document.getElementById('contact-email-link');
    link.href = `mailto:${s.email}`;
    link.textContent = s.email;

    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;
      const body = `이름: ${name || '(미입력)'}\n회신 이메일: ${email}\n\n${message}`;
      window.location.href = `mailto:${s.email}?subject=${encodeURIComponent('[fullake 문의] ' + subject)}&body=${encodeURIComponent(body)}`;
    });
  </script>
</body>
</html>
